name: Test Eclipse Temurin Installation on macOS

on:
  push:
    branches: [master, main, java-install-macos]
  pull_request:

jobs:
  test-java-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Veryfiy java and Tetrad installers work on MacOS
        run: |
          Rscript -e '
          source("R/install_java.R")
          install_java(force = TRUE)
          cat("\nJAVA_HOME =", Sys.getenv("JAVA_HOME"), "\n")
          system2("java", "-version", stdout=TRUE, stderr=TRUE)
          source("R/install_tetrad.R")
          install_tetrad()
          check_tetrad_install()
          '
